# === 模型与数据 ===
stage: sft
do_train: true
model_name_or_path: /home/haoxuan/Desktop/SpeculativeDecoding/models/qwen3-4b-passthrough
dataset: alpaca_zh,alpaca_en
dataset_dir: ./data
template: qwen

# === 剪枝恢复核心设定 ===
finetuning_type: lora
lora_target: all
lora_rank: 128

# === 输出路径 ===
output_dir: /home/haoxuan/Desktop/SpeculativeDecoding/models/pruned_qwen_recovered
overwrite_cache: true
overwrite_output_dir: true

# === 训练超参数 ===
cutoff_len: 2048
preprocessing_num_workers: 16
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_steps: 100
num_train_epochs: 3.0
bf16: true

# === 评估与保存 ===
val_size: 0.05
eval_strategy: steps
eval_steps: 500
save_steps: 500
logging_steps: 10

# === 断点续训 ===
resume_from_checkpoint: /home/haoxuan/Desktop/SpeculativeDecoding/models/pruned_qwen_recovered/checkpoint-12000

report_to: wandb
run_name: qwen3-4b-pruned-recovery-run1  # 这个名字会显示在网页看板上，你可以随便起